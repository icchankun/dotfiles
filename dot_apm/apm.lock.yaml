mcp_servers:
- aws-documentation
- chrome-devtools
- desktop-commander
- git
- github
- gitmcp
- homebrew
- playwright
mcp_configs:
  aws-documentation:
    name: aws-documentation
    transport: stdio
    env:
      FASTMCP_LOG_LEVEL: ERROR
      AWS_DOCUMENTATION_PARTITION: aws
    args:
    - awslabs.aws-documentation-mcp-server@latest
    registry: false
    command: uvx
  chrome-devtools:
    name: chrome-devtools
    transport: stdio
    args:
    - -y
    - chrome-devtools-mcp@latest
    registry: false
    command: npx
  desktop-commander:
    name: desktop-commander
    transport: stdio
    args:
    - -y
    - '@wonderwhy-er/desktop-commander@latest'
    registry: false
    command: npx
  git:
    name: git
    transport: stdio
    args:
    - mcp-server-git
    registry: false
    command: uvx
  github:
    name: github
    transport: http
    registry: false
    headers:
      Authorization: Bearer ${GITHUB_TOKEN}
    url: https://api.githubcopilot.com/mcp/
  gitmcp:
    name: gitmcp
    transport: http
    registry: false
    url: https://gitmcp.io/docs
  homebrew:
    name: homebrew
    transport: stdio
    args:
    - mcp-server
    registry: false
    command: /opt/homebrew/bin/brew
  playwright:
    name: playwright
    transport: stdio
    args:
    - '@playwright/mcp@latest'
    registry: false
    command: npx
